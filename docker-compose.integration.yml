version: "3.9"

# ── Integration test environment ──────────────────────────────────────────────
# Used by IntegrationTest build config.
# docker-compose down --volumes --remove-orphans (ALWAYS step) destroys everything.

networks:
  rag-net:
    driver: bridge

services:
  service-api:
    build:
      context: .
      dockerfile: service-api/Dockerfile
    ports:
      - "8000:8000"
    networks: [ rag-net ]
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 5s
      timeout: 5s
      retries: 12

  service-rag:
    build:
      context: .
      dockerfile: service-rag/Dockerfile
    ports:
      - "8001:8001"
    networks: [ rag-net ]
    environment:
      - OLLAMA_MODEL=llama3
